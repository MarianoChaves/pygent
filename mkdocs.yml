site_name: Pygent
site_url: https://pygent-ai.com/
repo_url: https://github.com/marianochaves/pygent
nav:
  - Overview: index.md
  - Getting Started: getting-started.md
  - Command Line Interface (CLI): cli.md
  - Configuration: configuration.md
  - Tools: tools.md
  - Custom Models: custom-models.md
  - Custom System Message: custom-system-message.md
  - Prompt Library: prompt-library.md
  - Architecture: architecture.md
  - Examples: examples.md
  - API Reference: api-reference.md
  - Optional Legacy Features:
    - Agent Presets (Legacy): agent-presets.md
    - Multi-Agent Collaboration (Legacy): crew-style.md
    - FastAPI Server (Legacy): fastapi-server.md
theme:
  name: material
  language: en
  logo: file_00000000b9e861f88eb06edc1f30e443.png
  favicon: file_00000000b9e861f88eb06edc1f30e443.png
  palette:
    - scheme: slate
      primary: black
      accent: '#1AFFA3'
  font: false
  features:
    - navigation.instant
    - content.code.copy
extra_css:
  - extra.css
extra_javascript:
  - extra.js
markdown_extensions:
  - admonition
  - footnotes
  - codehilite
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [.]
          options:
            show_root_heading: True
            members_order: source
            show_bases: True
            show_signature_annotations: True
            docstring_section_style: spacy
            merge_init_into_class: True
            show_if_no_docstring: True
            line_length: 80
            show_symbol_type_toc: True
            annotations_path: brief
